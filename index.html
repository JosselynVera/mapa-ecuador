<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Ecuador - Tooltip</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            color: #fbbf24;
            margin-bottom: 30px;
        }

        .map-container {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        }

        #ecuadorMap {
            width: 100%;
            height: auto;
            max-height: 700px;
        }

        .province {
            cursor: pointer;
            transition: all 0.3s ease;
            stroke: white;
            stroke-width: 1.5;
        }

        .province:hover {
            stroke-width: 3;
            filter: brightness(1.2);
        }

        .province-label {
            font-family: Arial, sans-serif;
            font-size: 10px;
            font-weight: bold;
            text-anchor: middle;
            pointer-events: none;
            fill: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(15, 23, 42, 0.95);
            color: #f1f5f9;
            padding: 8px 12px;
            border-radius: 8px;
            pointer-events: none;
            font-size: 14px;
            max-width: 220px;
            display: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
        }
    </style>
</head>

        const provinceInfo = {

            "El oro": { capital: "Machala", curioso: "Importante por su producción bananera." },
            "Cañar": { capital: "Azogues", curioso: "Rica en cultura cañari." },
            "Morona Santiago": { capital: "Macas", curioso: "La provincia más grande del país." },
            "Azuay": { capital: "Cuenca", curioso: "Ciudad Patrimonio Cultural." },
            "Loja": { capital: "Loja", curioso: "Conocida por su música y cultura fronteriza." },
            "Zamora Chinchipe": { capital: "Zamora", curioso: "Provincia minera de la Amazonía sur." }
        };

        function generatePath(points) {
            if(points.length === 0) return '';
            let path = `M ${points[0].x} ${points[0].y}`;
            for(let i=1;i<points.length;i++){ path += ` L ${points[i].x} ${points[i].y}`;}
            path += ' Z';
            return path;
        }

        function calculateCentroid(points){
            let x=0,y=0;
            for(let p of points){x+=p.x;y+=p.y;}
            return {x:x/points.length, y:y/points.length};
        }

        function createMap(){
            const svg = document.getElementById('ecuadorMap');
            const tooltip = document.getElementById('tooltip');

            mapData.shapes.forEach(province=>{
                const path = document.createElementNS("http://www.w3.org/2000/svg","path");
                path.setAttribute("d", generatePath(province.points));
                path.setAttribute("fill", province.color);
                path.classList.add("province");

                path.addEventListener('mousemove', (e)=>{
                    tooltip.style.display='block';
                    tooltip.style.left=e.pageX+15+'px';
                    tooltip.style.top=e.pageY+15+'px';
                    tooltip.innerHTML=`<strong>${province.name}</strong><br>Capital: ${provinceInfo[province.name].capital}<br>${provinceInfo[province.name].curioso}`;
                });

                path.addEventListener('mouseout', ()=>{
                    tooltip.style.display='none';
                });

                svg.appendChild(path);

                const label = document.createElementNS("http://www.w3.org/2000/svg","text");
                const centroid = calculateCentroid(province.points);
                label.setAttribute("x", centroid.x);
                label.setAttribute("y", centroid.y);
                label.textContent=province.name;
                label.classList.add("province-label");
                svg.appendChild(label);
            });
        }

        createMap();
    </script>
</body>
</html>
